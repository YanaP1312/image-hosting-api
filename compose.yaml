services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d mydb" ]
      interval: 2s
      timeout: 2s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/mydb
      DB_USERNAME: admin
      DB_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data: